<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/hasanah.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hasanah</title>
  <meta name="description"
    content="Keep Qur'an and Hadith close while you code with Hasanah, a VS Code extension that brings spiritual reminders to your development environment." />
  <!-- Add script to prevent FOUC (Flash Of Unstyled Content) -->
  <script>
    (function () {
      try {
        const preference = localStorage.getItem('darkMode');
        if (preference === 'true' || (!preference && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      } catch (e) {
        console.error("Error applying initial theme:", e);
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
